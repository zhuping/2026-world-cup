name: Sync Match Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-match-scores
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger score sync endpoint
        env:
          SYNC_URL: ${{ secrets.SCORE_SYNC_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SYNC_URL" ]; then
            echo "Missing SCORE_SYNC_URL secret"
            exit 1
          fi

          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          response=$(curl --silent --show-error --fail \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$SYNC_URL")

          echo "$response"
