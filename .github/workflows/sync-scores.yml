name: Sync Match Scores

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-match-scores
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync ESPN scores
        run: node scripts/sync-live-data.mjs

      - name: Commit live data
        run: |
          if git diff --quiet -- public/live-data.json; then
            echo "No live data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/live-data.json
          git commit -m "chore: sync live scores [skip ci]"
          git push
